/* ── Provenance — forensic attestation panel ─────────────────────────
   Renders SYSTEM.yamlTokens.provenance as a visible documentation
   section. Sourced from the Stage 2-Ground YAML frontmatter (which in
   turn draws from seed.json + the provenance pipeline). Surfaces:
     - coverage status badge (complete/sparse/minimal/empty)
     - identity attribution paragraph
     - sources by institution with clickable URLs (when imagery_urls
       array is present) or host+count rollup (legacy fallback)
     - typefaces attested with foundry, year, GF substitute, attestation tag
     - honest gaps (the forensic discipline's first-class content)
     - prompt versions and flags (run metadata)
   Bails out early when no provenance block is present.
   ──────────────────────────────────────────────────────────────── */
function buildProvenance() {
  const p = SYSTEM.yamlTokens?.provenance;
  if (!p || typeof p !== 'object') return '';

  // Local HTML-escape helper for user-derived strings (institution names,
  // URLs, gap prose). The data comes from the LLM-generated YAML, which
  // we treat as semi-trusted: escape <>&"' to be safe.
  const escP = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  // ── Coverage status badge ────────────────────────────────────────
  const status = String(p.coverage_status || 'unknown').toLowerCase();
  const statusBadge = `<span class="ds-prov-status ${escP(status)}">${escP(status)}</span>`;

  // ── Empty case: minimal panel ────────────────────────────────────
  if (status === 'empty') {
    const note = `No institutional imagery sources were verified for this subject. The visual claims in the design system should be treated as inferred until manual enrichment supplies primary references.`;
    let metaParts = [];
    if (p.imagery_count != null) metaParts.push(`<span>imagery_count: <strong>${escP(p.imagery_count)}</strong></span>`);
    if (p.manual_enrichment_required === true) metaParts.push(`<span class="ds-prov-flag-badge">manual enrichment required</span>`);
    if (p.prompt_versions?.forensic_capture) metaParts.push(`<span>forensic_capture: <strong>${escP(p.prompt_versions.forensic_capture)}</strong></span>`);
    const inner = statusBadge +
      `<div class="ds-prov-empty-note">${escP(note)}</div>` +
      (metaParts.length ? `<div class="ds-prov-meta-row">${metaParts.join('')}</div>` : '');
    return wrap('provenance', '★★ / Provenance', 'Forensic Provenance', inner);
  }

  // ── Identity attribution ─────────────────────────────────────────
  let identityBlock = '';
  if (p.identity_description) {
    identityBlock = `<div class="ds-prov-identity">${escP(p.identity_description)}</div>`;
  }

  // ── Sources block ────────────────────────────────────────────────
  // Prefer imagery_urls (structured URL list, lets us link). Fallback to
  // sources (host+count rollup) when imagery_urls is absent or empty.
  let sourcesHtml = '';
  if (Array.isArray(p.imagery_urls) && p.imagery_urls.length) {
    // Group URLs by institution (or host fallback), keep first URL per group
    const grouped = new Map();
    for (const entry of p.imagery_urls) {
      if (!entry || !entry.url) continue;
      const key = entry.institution || entry.host || 'Unknown';
      if (!grouped.has(key)) grouped.set(key, { count: 0, firstUrl: entry.url });
      grouped.get(key).count++;
    }
    const items = [...grouped.entries()]
      .sort((a, b) => b[1].count - a[1].count)
      .map(([inst, info]) => `
        <div class="ds-prov-source-item">
          <span class="ds-prov-source-inst"><a href="${escP(info.firstUrl)}" target="_blank" rel="noopener noreferrer">${escP(inst)}</a></span>
          <span class="ds-prov-source-count">${info.count} URL${info.count === 1 ? '' : 's'}</span>
        </div>`).join('');
    sourcesHtml = `<div class="ds-prov-source-list">${items}</div>`;
  } else if (Array.isArray(p.sources) && p.sources.length) {
    // Legacy host+count rollup (no URLs available)
    const items = p.sources.map(s => `
      <div class="ds-prov-source-item">
        <span class="ds-prov-source-inst">${escP(s.host || 'unknown')}</span>
        <span class="ds-prov-source-count">${escP(s.count)} URL${Number(s.count) === 1 ? '' : 's'}</span>
      </div>`).join('');
    sourcesHtml = `<div class="ds-prov-source-list">${items}</div>`;
  } else {
    sourcesHtml = `<div class="ds-prov-empty-note">No verified imagery sources.</div>`;
  }

  // ── Typefaces attested block ─────────────────────────────────────
  let typefacesHtml = '';
  if (Array.isArray(p.typefaces_attested) && p.typefaces_attested.length) {
    const items = p.typefaces_attested.map(t => {
      const name = escP(t.name || 'Unknown');
      const foundry = t.foundry ? escP(t.foundry) : null;
      const year = t.year != null ? escP(t.year) : null;
      const metaParts = [];
      if (foundry) metaParts.push(foundry);
      if (year) metaParts.push(year);
      const metaLine = metaParts.length ? `<div class="ds-prov-typeface-meta">${metaParts.join(' · ')}</div>` : '';

      const att = String(t.attestation || 'unverified').toLowerCase();
      const isCustom = t.is_custom === true || t.is_custom === 'true';
      const tagClass = isCustom ? 'custom' : (att === 'attested' ? 'attested' : '');
      const tagText = isCustom ? 'custom' : att;
      const tagHtml = `<span class="ds-prov-typeface-tag ${tagClass}">${escP(tagText)}</span>`;

      let subLine = '';
      if (isCustom) {
        subLine = `<div class="ds-prov-typeface-sub">${tagHtml} bespoke imagery — no web-font substitute</div>`;
      } else if (t.google_fonts) {
        subLine = `<div class="ds-prov-typeface-sub">${tagHtml} → ${escP(t.google_fonts)}</div>`;
      } else {
        subLine = `<div class="ds-prov-typeface-sub">${tagHtml} no Google Fonts substitute</div>`;
      }

      return `
        <div class="ds-prov-typeface-item">
          <div class="ds-prov-typeface-name">${name}</div>
          ${metaLine}
          ${subLine}
        </div>`;
    }).join('');
    typefacesHtml = `<div class="ds-prov-typeface-list">${items}</div>`;
  } else {
    typefacesHtml = `<div class="ds-prov-empty-note">No typefaces attested.</div>`;
  }

  // ── Two-column split: Sources | Typefaces ────────────────────────
  const splitBlock = `
    <div class="ds-prov-split">
      <div>
        <div class="ds-prov-col-title">Verified sources</div>
        ${sourcesHtml}
      </div>
      <div>
        <div class="ds-prov-col-title">Typefaces attested</div>
        ${typefacesHtml}
      </div>
    </div>`;

  // ── Honest gaps ──────────────────────────────────────────────────
  let gapsBlock = '';
  if (Array.isArray(p.honest_gaps) && p.honest_gaps.length) {
    const items = p.honest_gaps.map(g => `<li>${escP(g)}</li>`).join('');
    gapsBlock = `
      <div class="ds-prov-gaps">
        <div class="ds-prov-gaps-label">Honest gaps</div>
        <ul style="margin:0; padding-left:18px;">${items}</ul>
      </div>`;
  }

  // ── Meta row: prompt versions, flags, manual-enrichment ──────────
  const metaParts = [];
  if (p.imagery_count != null) metaParts.push(`<span>imagery_count: <strong>${escP(p.imagery_count)}</strong></span>`);
  if (p.prompt_versions?.forensic_capture) metaParts.push(`<span>forensic_capture: <strong>${escP(p.prompt_versions.forensic_capture)}</strong></span>`);
  if (p.prompt_versions?.extraction) metaParts.push(`<span>extraction: <strong>${escP(p.prompt_versions.extraction)}</strong></span>`);
  if (p.prompt_versions?.typography_map) metaParts.push(`<span>typography_map: <strong>${escP(p.prompt_versions.typography_map)}</strong></span>`);
  if (p.manual_enrichment_required === true) metaParts.push(`<span class="ds-prov-flag-badge">manual enrichment required</span>`);
  if (Array.isArray(p.flags) && p.flags.length) {
    for (const flag of p.flags) {
      metaParts.push(`<span class="ds-prov-flag-badge">${escP(flag)}</span>`);
    }
  }
  const metaBlock = metaParts.length ? `<div class="ds-prov-meta-row">${metaParts.join('')}</div>` : '';

  // ── Coverage status preamble (for sparse/minimal) ────────────────
  let preamble = '';
  if (status === 'sparse') {
    preamble = `<div class="ds-prov-empty-note" style="margin-bottom:18px;">Imagery coverage is sparse — only ${escP(p.imagery_count != null ? p.imagery_count : 'a few')} institutional records verified.</div>`;
  } else if (status === 'minimal') {
    preamble = `<div class="ds-prov-empty-note" style="margin-bottom:18px;">This subject has minimal verified imagery. Treat this panel as a transparency notice.</div>`;
  }

  const inner = statusBadge + preamble + identityBlock + splitBlock + gapsBlock + metaBlock;
  return wrap('provenance', '★★ / Provenance', 'Forensic Provenance', inner);
}


/* ════════════════════════════════════════════════════════════════════
   MULTI-AXIS CHART
   ════════════════════════════════════════════════════════════════════ */
function buildChart(data, primary, secondary) {
  const sc2 = SYSTEM.semanticColors || {};
  const gc  = cs('gridColor',  sc2.chartGrid  || 'rgba(128,128,128,0.15)');
  const lc  = cs('labelColor', sc2.chartLabel || 'rgba(128,128,128,0.7)');
  const ff  = cs('fontFamily', sc2.chartFont  || 'monospace');
  const dr  = cs('dotRadius',  2.5);
  const lw  = cs('lineWidth',  1.8);
  const fs  = cs('fontSize',   7);
  if (!data?.series) {
    if (!data?.bars) return '<div style="padding:20px;font-family:monospace;font-size:10px;color:var(--on-bg-muted);">No chart data</div>';
    const W=560,H=160,pL=6,pR=6,pT=14,pB=26,iW=W-pL-pR,iH=H-pT-pB,max=Math.max(...data.bars),bW=iW/data.bars.length;
    const gl=[.25,.5,.75,1].map(t=>{const y=pT+iH*(1-t);return`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="${gc}" stroke-width="1"/><text x="${pL+2}" y="${y-3}" fill="${lc}" font-size="${fs}" font-family="${ff}">${Math.round(max*t)}</text>`;}).join('');
    const bars=data.bars.map((v,i)=>{const bH=(v/max)*iH,x=pL+i*bW+bW*.12,w=bW*.72,y=pT+iH-bH;return`<rect x="${x}" y="${y}" width="${w}" height="${bH}" fill="${primary}" opacity="0.8"/>`;}).join('');
    const pts=data.bars.map((v,i)=>`${pL+i*bW+bW*.5},${pT+iH-(v/max)*iH}`).join(' ');
    const dots=data.bars.map((v,i)=>`<circle cx="${pL+i*bW+bW*.5}" cy="${pT+iH-(v/max)*iH}" r="${dr}" fill="${secondary}"/>`).join('');
    const lbls=data.bars.map((l,i)=>`<text x="${pL+i*bW+bW*.5}" y="${H-6}" text-anchor="middle" fill="${lc}" font-size="${fs}" font-family="${ff}">${data.labels[i]}</text>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" style="position:absolute;top:0;left:0;width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">${gl}${bars}<polyline points="${pts}" fill="none" stroke="${secondary}" stroke-width="${lw}"/>${dots}${lbls}</svg>`;
  }
  const series=data.series,labels=data.labels;
  // Use max data length so xPos never overflows the viewBox [master fix 15]
  const n=Math.max(labels.length,...series.map(s=>s.data?.length||0));
  const W=600,H=190,pL=54,pT=18,pB=30,AXIS_W=40;
  const pR=Math.max(12,series.filter(s=>s.axis!=='left').length*AXIS_W+8);
  const plotW=W-pL-pR,plotH=H-pT-pB;
  const scales=series.map(s=>{const mn=Math.min(...s.data),mx=Math.max(...s.data),p=(mx-mn)*0.1||1;return{min:mn-p,max:mx+p};});
  const xPos=i=>pL+(i/(n-1))*plotW;
  const yPos=(si,v)=>{const sc=scales[si];return pT+plotH-((v-sc.min)/(sc.max-sc.min))*plotH;};
  const fmt=v=>{const a=Math.abs(v);return a>=1000?(v/1000).toFixed(1)+'k':a>=100?Math.round(v).toString():a>=10?v.toFixed(1):v.toFixed(2);};
  let grid='';
  [0,.25,.5,.75,1].forEach(t=>{const y=pT+plotH*(1-t);grid+=`<line x1="${pL}" y1="${y}" x2="${pL+plotW}" y2="${y}" stroke="${gc}" stroke-width="1"/>`;});
  grid+=`<line x1="${pL}" y1="${pT+plotH}" x2="${pL+plotW}" y2="${pT+plotH}" stroke="${gc}" stroke-width="1"/>`;
  let xl=''; labels.forEach((l,i)=>{xl+=`<text x="${xPos(i)}" y="${H-8}" text-anchor="middle" fill="${lc}" font-size="${fs}" font-family="${ff}">${l}</text>`;});
  let la=''; const ls2=series.find(s=>s.axis==='left');
  if(ls2){const si=series.indexOf(ls2);la+=`<line x1="${pL}" y1="${pT}" x2="${pL}" y2="${pT+plotH}" stroke="${ls2.color}" stroke-width="1" opacity=".5"/>`;[0,.25,.5,.75,1].forEach(t=>{const v=scales[si].min+(scales[si].max-scales[si].min)*t,y=pT+plotH*(1-t);la+=`<text x="${pL-5}" y="${y+3}" text-anchor="end" fill="${ls2.color}" font-size="${fs}" font-family="${ff}" opacity=".85">${fmt(v)}</text>`;});la+=`<text transform="rotate(-90,${pL-38},${pT+plotH/2})" x="${pL-38}" y="${pT+plotH/2}" text-anchor="middle" fill="${ls2.color}" font-size="${fs}" font-family="${ff}" opacity=".7">${ls2.label}</text>`;}
  let ra=''; let ri=0;
  series.forEach((s,si)=>{if(s.axis==='left')return;const axX=pL+plotW+10+ri*AXIS_W;ra+=`<line x1="${axX}" y1="${pT}" x2="${axX}" y2="${pT+plotH}" stroke="${s.color}" stroke-width="1" opacity=".4"/>`;[0,.5,1].forEach(t=>{const v=scales[si].min+(scales[si].max-scales[si].min)*t,y=pT+plotH*(1-t);ra+=`<text x="${axX+4}" y="${y+3}" text-anchor="start" fill="${s.color}" font-size="${fs}" font-family="${ff}" opacity=".85">${fmt(v)}</text>`;});ra+=`<text x="${axX+4}" y="${pT-4}" fill="${s.color}" font-size="${fs}" font-family="${ff}" opacity=".7">${s.label}</text>`;ri++;});
  let lines='';
  series.forEach((s,si)=>{const pts=s.data.map((v,i)=>`${xPos(i).toFixed(1)},${yPos(si,v).toFixed(1)}`).join(' ');lines+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${lw}" opacity=".9" stroke-linejoin="round" stroke-linecap="round"/>`;lines+=s.data.map((v,i)=>`<circle cx="${xPos(i).toFixed(1)}" cy="${yPos(si,v).toFixed(1)}" r="${dr}" fill="${s.color}" opacity=".9"/>`).join('');});
  let leg='';
  series.forEach((s,si)=>{const lx=pL+(si+.5)*(plotW/series.length);leg+=`<line x1="${lx-10}" y1="${H-24}" x2="${lx-2}" y2="${H-24}" stroke="${s.color}" stroke-width="2"/><circle cx="${lx-6}" cy="${H-24}" r="${dr}" fill="${s.color}"/><text x="${lx+2}" y="${H-21}" fill="${s.color}" font-size="${fs}" font-family="${ff}" opacity=".9">${s.label}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" style="position:absolute;top:0;left:0;width:100%;height:100%;" preserveAspectRatio="xMidYMid meet">${grid}${la}${ra}${lines}${xl}${leg}</svg>`;
}

function buildSplash() { // [master fix 25 — merged into hero]
  return null; // hero zone handled by buildSiteHero [fix 25]
  const el = document.createElement('div');
  el.id = 'splash';
  el.className = 'gux-kinetic-zone';
  el.style.cssText = 'position:relative;overflow:hidden;background:var(--bg);';
  // Inject entrance keyframes once
  if (!document.getElementById('gux-kz-kf')) {
    const s = document.createElement('style'); s.id = 'gux-kz-kf';
    s.textContent =
      '@keyframes gux-kz-rise{0%{opacity:0;transform:translateY(28px)}100%{opacity:1;transform:none}}' +
      '@keyframes gux-kz-fade{0%{opacity:0}100%{opacity:.55}}' +
      '@keyframes gux-kz-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.014)}}' +
      '.gux-kinetic-zone{min-height:60vh;display:flex;align-items:center;justify-content:center;}' +
      '.gux-kz-content{position:relative;z-index:2;text-align:center;padding:clamp(32px,6vw,80px) clamp(24px,5vw,80px);}' +
      '.gux-kz-title{font-family:var(--font-display);font-size:clamp(40px,8vw,120px);font-weight:900;' +
        'line-height:1;color:var(--primary);text-transform:uppercase;letter-spacing:-0.02em;' +
        'animation:gux-kz-rise 1.2s cubic-bezier(.16,1,.3,1) both;}' +
      '.gux-kz-tagline{font-family:var(--font-body);font-size:clamp(11px,1.4vw,18px);' +
        'color:var(--on-bg-muted);margin-top:1.4em;letter-spacing:.06em;' +
        'animation:gux-kz-fade 1.8s .5s ease both;}';
    document.head.appendChild(s);
  }
  // Author-provided splash: honour it; ensure canvas has room
  if (SYSTEM.layouts?.splashRender) {
    const fn = typeof SYSTEM.layouts.splashRender === 'function'
      ? SYSTEM.layouts.splashRender : resolveRenderFn(SYSTEM.layouts.splashRender);
    if (typeof fn === 'function') {
      try { fn(el); } catch(e) { console.warn('[GUX] splashRender error:', e); }
      el.style.minHeight = el.style.minHeight || '40vh';
      return el;
    }
  }
  // Fallback: cinematic system name with ambient canvas backing
  const name = (SYSTEM.meta?.name || '').toUpperCase();
  const tagline = SYSTEM.meta?.tagline || '';
  const inner = document.createElement('div');
  inner.className = 'gux-kz-content';
  inner.innerHTML =
    '<div class="gux-kz-title">' + name + '</div>' +
    (tagline ? '<div class="gux-kz-tagline">' + tagline + '</div>' : '');
  el.appendChild(inner);
  return el;
}

function injectSectionSeparators() { // [master fix 22]
  var ss = SYSTEM.layouts && SYSTEM.layouts.sectionSeparator;
  var fn = ss ? (typeof ss === 'function' ? ss : resolveRenderFn(ss)) : null;
  document.querySelectorAll('hr.ds-divider').forEach(function(hr) {
    if (fn) {
      try {
        var node = fn();
        if (node instanceof Element) {
          node.style.display = node.style.display || 'block';
          hr.parentNode.replaceChild(node, hr);
          return;
        }
      } catch(e) { /* fall through to styled hr */ }
    }
    // No sectionSeparator: style the hr with a system-aware gradient
    hr.style.cssText = 'border:none;height:1px;margin:0;' +
      'background:linear-gradient(90deg,var(--primary) 0%,var(--border) 40%,var(--border) 100%);' +
      'opacity:0.35;';
  });
}
function appendSectionSeparator(parent, sectionSeparator) {
  if (!sectionSeparator) return;
  const fn = typeof sectionSeparator === 'function' ? sectionSeparator : resolveRenderFn(sectionSeparator);
  if (typeof fn !== 'function') return;
  try {
    const node = fn();
    if (node instanceof Element) parent.appendChild(node);
  } catch(e) { console.warn('[GUX] sectionSeparator error:', e); }
}

function buildLandingPage() {
  if(!SYSTEM.layouts) return null;
  const {copy,heroBackground,sectionSeparator,surfaceOverlay,ctaBackground,showcaseRender}=SYSTEM.layouts;
  if(!copy) return null;
  const primary=tok('--primary')||'#888', secondary=tok('--secondary-col')||primary;
  const heroGlow=layoutFlag('heroTitleGlow',false);
  const showCTA    = ls('showCTAStrip',true);
  const showFooter = ls('showFooter',true);
  const showNav    = ls('showNavLinks',true);

  const page=document.createElement('div'); page.className='ds-layout-section'; page.id='landing';
  const lbl=document.createElement('div'); lbl.className='ds-layout-label';
  lbl.innerHTML=`<div class="ds-section-index">L1 / Layout Preview</div><h2 class="ds-section-title">Landing Page</h2><div class="ds-layout-note">Fixed scaffold · layout config applied · not a production template</div>`;
  page.appendChild(lbl);
  const frame=document.createElement('div'); frame.className='ds-layout-frame'; page.appendChild(frame);

  if(showNav){
    const nav=document.createElement('nav'); nav.className='lp-nav';
    nav.innerHTML=`<div class="lp-nav-brand">${SYSTEM.meta.name}</div><ul class="lp-nav-links">${(copy.navLinks||[]).map(l=>`<li>${l}</li>`).join('')}</ul><div>${copy.heroCtaSecHtml||''}</div>`;
    if(surfaceOverlay)applyOverlay(surfaceOverlay, nav); frame.appendChild(nav);
  }
  // Apply fallback styling to CTA buttons that have no inline styles (class= was stripped)
  function _styleBareButtons(html, isPrimary) {
    if (!html) return '';
    return html.replace(/<button(?![^>]*style=)([^>]*)>/gi, function(_, attrs) {
      var bg = isPrimary ? 'var(--primary)' : 'transparent';
      var col = isPrimary ? 'var(--on-primary)' : 'var(--secondary-col)';
      var border = isPrimary ? 'none' : '2px solid var(--secondary-col)';
      return `<button${attrs} style="background:${bg};color:${col};border:${border};padding:14px 24px;font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:12px;box-shadow:${isPrimary ? '0 0 8px var(--primary)' : 'none'};">`;
    });
  }
  const _ctaHtml    = _styleBareButtons(copy.heroCtaHtml||'', true);
  const _ctaSecHtml = _styleBareButtons(copy.heroCtaSecHtml||'', false);

  const hero=document.createElement('div'); hero.className='lp-hero';
  const hc=document.createElement('div'); hc.className='lp-hero-content';
  const tShadow=heroGlow?`text-shadow:4px 4px 0 ${secondary},0 0 30px ${primary};`:'';
  hc.innerHTML=`<div class="lp-hero-kicker">${copy.heroKicker||''}</div><div class="lp-hero-title" style="font-size:clamp(32px,6vw,68px);color:${primary};${tShadow}">${copy.heroHeadline||''}</div><div class="lp-hero-sub">${copy.heroSub||''}</div><div class="lp-hero-btns">${_ctaHtml}${_ctaSecHtml}</div>`;
  hero.appendChild(hc); frame.appendChild(hero);
  if(heroBackground)applyBackground(heroBackground, hero);
  if(surfaceOverlay)applyOverlay(surfaceOverlay, hero);
  appendSectionSeparator(frame, sectionSeparator);

  if(copy.features?.length){
    const feats=document.createElement('div'); feats.className='lp-features';
    copy.features.forEach(f=>{
      const cell=document.createElement('div'); cell.className='lp-feature';
      if(f.cardHtml){cell.innerHTML=f.cardHtml;}
      else{
        // Wrap content in a positioned container so it always stacks ABOVE the surfaceOverlay
        // child added by applyOverlay (which sits at z-index:2). Matches the pattern used
        // by .lp-hero-content (z-index:5) and .lp-cta-strip-content (z-index:5).
        cell.innerHTML=`<div class="lp-feature-content" style="position:relative;z-index:3;"><span class="lp-feature-icon" style="color:${primary};">${f.icon||''}</span><div class="lp-feature-title">${f.title||''}</div><div class="lp-feature-desc">${f.desc||''}</div></div>`;
        if(surfaceOverlay)applyOverlay(surfaceOverlay, cell);
      }
      feats.appendChild(cell);
    });
    frame.appendChild(feats);
    appendSectionSeparator(frame, sectionSeparator);
  }
  if(showcaseRender){
    const showFn = typeof showcaseRender === 'function' ? showcaseRender : resolveRenderFn(showcaseRender);
    if (typeof showFn === 'function') {
      const sc=document.createElement('div');
      try { showFn(sc); frame.appendChild(sc); appendSectionSeparator(frame, sectionSeparator); }
      catch(e) { console.warn('[GUX] showcaseRender error:', e); }
    }
  }

  if(showCTA){
    const cta=document.createElement('div'); cta.className='lp-cta-strip';
    const ctac=document.createElement('div'); ctac.className='lp-cta-strip-content';
    const _ctaStripHtml = _styleBareButtons(copy.ctaStripHtml||'', true);
    ctac.innerHTML=`<div class="lp-cta-strip-title" style="font-size:clamp(18px,3vw,30px);color:${primary};">${copy.ctaStripHeadline||''}</div><div style="margin-top:8px;">${_ctaStripHtml}</div>`;
    cta.appendChild(ctac);
    if(ctaBackground)applyBackground(ctaBackground, cta);
    if(surfaceOverlay)applyOverlay(surfaceOverlay, cta);
    frame.appendChild(cta);
  }
  if(showFooter){
    const foot=document.createElement('div'); foot.className='lp-footer';
    foot.innerHTML=`<div class="lp-footer-brand" style="position:relative;z-index:3;">${SYSTEM.meta.name}</div><div class="lp-footer-copy" style="position:relative;z-index:3;">© ${new Date().getFullYear()}</div>`;
    if(surfaceOverlay)applyOverlay(surfaceOverlay, foot);
    frame.appendChild(foot);
  }
  return page;
}

function buildDashboard() {
  if(!SYSTEM.layouts) return null;
  const {copy,surfaceOverlay,panelCRender,dashboardShellBackground}=SYSTEM.layouts;
  // chartData may sit at layouts.chartData (correct) or layouts.copy.chartData (model misplacement)
  const chartData = SYSTEM.layouts.chartData || copy?.chartData;
  if(!copy) return null;

/* ── Fix 1: Post-render DOM tokenizer ────────────────────────────── */
function tokenizeInlineStyles() {
  const main = document.getElementById('ds-main');
  if (!main || !SYSTEM.tokens) return;
  const safeHexes = new Set(['#000000','#ffffff','#000','#fff','#00000000','#ffffff00']);
  const colorMap = new Map();
  for (const [k, v] of Object.entries(SYSTEM.tokens)) {
    if (!k.startsWith('--') || k.startsWith('--font') || k.startsWith('--radius')) continue;
    if (typeof v !== 'string' || !v.startsWith('#')) continue;
    if (safeHexes.has(v.toLowerCase())) continue;
    colorMap.set(v.toLowerCase(), k);
  }
  if (!colorMap.size) return;
  main.querySelectorAll('.ds-section [style], .ds-layout-section [style]').forEach(el => {
    let s = el.getAttribute('style');
    if (!s) return;
    let changed = false;
    for (const [hex, varName] of colorMap) {
      if (s.toLowerCase().includes(hex)) {
        s = s.replace(new RegExp(hex.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), `var(${varName})`);
        changed = true;
      }
    }
    if (/border-radius\s*:\s*9{3,}px/i.test(s)) {
      s = s.replace(/border-radius\s*:\s*9{3,}px/gi, 'border-radius:var(--radius-btn)');
      changed = true;
    } else if (/border-radius\s*:\s*0(?!\d)/.test(s)) {
      s = s.replace(/border-radius\s*:\s*0(?!\d)/g, 'border-radius:var(--radius-default,0px)');
      changed = true;
    } else if (/border-radius\s*:\s*[\d.]+px/.test(s)) {
      s = s.replace(/border-radius\s*:\s*[\d.]+px/g, 'border-radius:var(--radius-default)');
      changed = true;
    }
    if (changed) el.setAttribute('style', s);
  });
}

  elRadius.value = initialSlider;
  elRval.textContent = initialSlider + 'px';
  elPrimary.addEventListener('input', () => {
    // Capture old primary hex BEFORE changing it
    var _oldPrimary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim().toLowerCase();
    set('--primary', elPrimary.value);
    rebuildLiveOverrides();
    // Sweep ALL inline-styled elements: replace old primary hex with var(--primary)
    // This covers landing page hero/features/cta which embed tok('--primary') as hex
    if (_oldPrimary && _oldPrimary.startsWith('#') && !['#000','#000000','#fff','#ffffff'].includes(_oldPrimary)) {
      document.querySelectorAll('[style]').forEach(function(el) {
        var s = el.getAttribute('style');
        if (s && s.toLowerCase().indexOf(_oldPrimary) >= 0) {
          el.setAttribute('style', s.split(_oldPrimary).join('var(--primary)').split(_oldPrimary.toUpperCase()).join('var(--primary)'));
        }
      });
    }
    if (typeof enforceTextContrast === 'function') enforceTextContrast();
  });
  elRadius.addEventListener('input', () => {
    const scale = parseFloat(elRadius.value);
    for (const k of RADIUS_KEYS) {
      if (radiusBase[k] >= 100) { set(k, '9999px'); continue; } // pill stays pill
      // All-zero: apply slider value directly so systems with sharp-edge defaults
      // can be previewed with rounded corners without the ratio always being 0.
      const newPx = _radiusAllZero ? scale : Math.round(scale * radiusBase[k] / maxBase);
      set(k, `${newPx}px`);
    }
    // Set --gux-global-radius so the * rule reaches all inline-styled elements
    if (Math.round(scale) === initialSlider) {
      document.documentElement.style.removeProperty('--gux-global-radius');
    } else {
      set('--gux-global-radius', scale + 'px');
    }
    elRval.textContent = scale + 'px';
    rebuildLiveOverrides();
  });
  elTypescale.addEventListener('input', () => {
    set('--gux-type-scale', elTypescale.value);
    elTval.textContent = parseFloat(elTypescale.value).toFixed(2) + '×';
  });
  elModeToggle.addEventListener('click', () => {
    modeFlipped = !modeFlipped;
    const mode = modeFlipped ? flipMode : origMode;
    Object.entries(mode).forEach(([k, v]) => set(k, v));
    elModeToggle.classList.toggle('active', modeFlipped);
  });
  elReset.addEventListener('click', () => {
    ALL_KEYS.forEach(k => set(k, originals[k]));
    document.documentElement.style.removeProperty('--gux-type-scale');
    document.documentElement.style.removeProperty('--gux-global-radius');
    elPrimary.value = originals['--primary'] || '#888888';
    elRadius.value = initialSlider;
    elRval.textContent = initialSlider + 'px';
    elTypescale.value = '1';
    elTval.textContent = '1.00×';
    modeFlipped = false;
    elModeToggle.classList.remove('active');
    rebuildLiveOverrides();
  });
  function openPanel() { panel.classList.add('open'); }
  function closePanel() { panel.classList.remove('open'); }
  elClose.addEventListener('click', closePanel);
  elClose.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') closePanel(); });
  if (!isMobile) {
    document.addEventListener('keydown', e => {
      if (e.key !== 't' && e.key !== 'T') return;
      const active = document.activeElement;
      if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      panel.classList.contains('open') ? closePanel() : openPanel();
    });
    document.addEventListener('click', e => {
      if (panel.classList.contains('open') && !panel.contains(e.target) && e.target.id !== 'gux-editor-fab') closePanel();
    });
  } else {
    const fab = document.createElement('button');
    fab.id = 'gux-editor-fab';
    fab.textContent = '⚙';
    fab.setAttribute('aria-label', 'Open live token editor');
    fab.style.display = 'flex';
    fab.addEventListener('click', () => panel.classList.contains('open') ? closePanel() : openPanel());
    document.body.appendChild(fab);
    document.addEventListener('touchstart', e => {
      if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== fab) closePanel();
    }, { passive:true });
  }
}

function applyShadcnTokens() {
  const st = SYSTEM.shadcnTokens;

/* ════════════════════════════════════════════════════════════════════
   GUX ENHANCEMENTS v1
   Browser-compat fixes, mobile adaptation, and new renderer features.
   All features are capability-detected and reduced-motion-safe.
   ════════════════════════════════════════════════════════════════════ */

/* ── Device capability flags (computed once at load time) ─────────── */
const GUX = {
  isMobile:      navigator.maxTouchPoints > 0,
  hasFinePt:     window.matchMedia('(pointer:fine)').matches,
  reducedMotion: window.matchMedia('(prefers-reduced-motion:reduce)').matches,
  isLowEnd:      (navigator.hardwareConcurrency || 4) <= 2
                 || (navigator.deviceMemory != null && navigator.deviceMemory < 2),
  dpr:           Math.min(window.devicePixelRatio || 1, 2),
};

/* ── Fix: real viewport height (iOS 100vh bug) ──────────────────── */
function initViewportHeight() {
  const set = () =>
    document.documentElement.style.setProperty('--real-vh', (window.innerHeight * 0.01) + 'px');
  set();
  window.addEventListener('resize', set, { passive:true });
}


/* ── Feature: scroll progress ribbon ────────────────────────────── */
function initProgressRibbon() {
  document.getElementById('gux-progress')?.remove();
  const bar = document.createElement('div');
  bar.id = 'gux-progress';
  if (SYSTEM.surfaceModel === 'glow') document.body.classList.add('gux-surf-glow');
  document.body.appendChild(bar);
  if (!window.__guxProgressBound) {
    window.__guxProgressBound = true;
    window.addEventListener('scroll', () => {
      const el = document.documentElement;
      const pct = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100 || 0;
      const current = document.getElementById('gux-progress');
      if (current) current.style.width = Math.min(pct, 100) + '%';
    }, { passive:true });
  }
}

/* ── Feature: scroll-triggered section reveals ───────────────────── */
function initScrollReveal() {
  if (!('IntersectionObserver' in window)) {
    // Fallback: make everything visible
    document.querySelectorAll('.ds-section, .ds-layout-section').forEach(el => el.style.opacity = '1');
    return;
  }
  if (GUX.reducedMotion) {
    document.querySelectorAll('.gux-reveal').forEach(el => el.classList.add('gux-revealed'));
    return;
  }

  // Choose entrance style: LLM field wins, else derive from surfaceModel
  const sm = SYSTEM.scrollRevealMode;
  const styleMap = {
    glow:'fade-up', shadow:'fade-up', bevel:'stamp', flat:'fade-up',
    paper:'develop', 'crt-screen':'scan', halftone:'pixel',
    'printed-plastic':'scan', broadcast:'scan', collage:'fade-up', 'coated-card':'develop',
  };
  const style    = sm?.style    || styleMap[SYSTEM.surfaceModel] || 'fade-up';
  const dur      = sm?.duration || 440;
  const stagger  = sm?.stagger  || 65;
  const easing   = sm?.easing   || 'cubic-bezier(0.16, 1, 0.3, 1)';

  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      // Stagger child cells for richness
      const children = el.querySelectorAll(
        '.ds-swatch,.ds-btn-item,.ds-card-grid>*,.ds-motion-cell,.ds-effect-cell,' +
        '.ds-doavoid-pair,.ds-var-cell,.ds-elev-card,.ds-radius-item,.ds-spacing-item'
      );
      children.forEach((c, i) => { c.style.transitionDelay = (i * stagger) + 'ms'; });
      el.style.transitionDuration = dur + 'ms';
      el.style.transitionTimingFunction = easing;
      el.classList.add('gux-revealed');
      io.unobserve(el);
    });
  }, { threshold:0.06, rootMargin:'0px 0px -32px 0px' });

  document.querySelectorAll('.ds-section, .ds-layout-section').forEach(el => {
    el.classList.add('gux-reveal', `gux-enter-${style}`);
    io.observe(el);
  });
}


function initComponentFlipper() {
  if (GUX.reducedMotion) return;
  const items = document.querySelectorAll('.ds-btn-item');
  if (items.length < 2) return;
  if (window.__guxFlipper) { clearInterval(window.__guxFlipper); window.__guxFlipper = null; }
  let idx = 0;
  window.__guxFlipper = setInterval(() => {
    items.forEach(el => el.classList.remove('gux-flip-active'));
    items[idx % items.length].classList.add('gux-flip-active');
    idx++;
  }, 2000);
}

/* ── Feature: double-click / long-press token inspector ─────────── */
function initInspectTooltip() {
  document.getElementById('gux-inspect')?.remove();
  const GUX_KEYS = [
    '--primary','--secondary-col','--bg','--surface',
    '--on-bg','--on-bg-muted','--border','--error',
    '--font-display','--font-body',
    '--radius-card','--radius-btn','--radius-default',
  ];
  const tip = document.createElement('div');
  tip.id = 'gux-inspect';
  tip.innerHTML = '<div id="gux-ibody"></div>' +
    '<span class="gux-iclose" role="button" tabindex="0" aria-label="Close token inspector">✕ close</span>';
  document.body.appendChild(tip);
  tip.querySelector('.gux-iclose').addEventListener('click', () => tip.classList.remove('visible'));

  function show(x, y) {
    const cs  = getComputedStyle(document.documentElement);
    const rows = GUX_KEYS.map(k => {
      const v = cs.getPropertyValue(k).trim();
      if (!v) return '';
      const isHex = /^#[0-9a-f]{3,8}$/i.test(v);
      const isRgb = v.startsWith('rgb');
      const sw = (isHex || isRgb)
        ? `<span class="gux-iswatch" style="background:${v}"></span>` : '';
      const disp = v.length > 24 ? v.slice(0, 22) + '…' : v;
      return `<div class="gux-irow">${sw}<span class="gux-ikey">${k}</span>` +
             `<span class="gux-ival">${disp}</span></div>`;
    }).filter(Boolean).join('');
    document.getElementById('gux-ibody').innerHTML = rows;
    // Position: keep inside viewport
    const W = 276, H = 220;
    const tx = (x + W + 14 > window.innerWidth)  ? x - W - 6 : x + 12;
    const ty = (y + H + 14 > window.innerHeight) ? y - H - 6 : y + 12;
    tip.style.left = Math.max(6, tx) + 'px';
    tip.style.top  = Math.max(6, ty) + 'px';
    tip.classList.add('visible');
  }

  if (!GUX.isMobile) {
    document.addEventListener('dblclick', e => {
      if (e.target.closest('#gux-inspect')) return;
      show(e.clientX, e.clientY);
    });
  } else {
    let timer, sx, sy;
    document.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      timer = setTimeout(() => show(sx, sy), 620);
    }, { passive:true });
    document.addEventListener('touchmove',  () => clearTimeout(timer), { passive:true });
    document.addEventListener('touchend',   () => clearTimeout(timer), { passive:true });
  }
}

/* ── Feature: ambient canvas (SYSTEM.ambientCanvas field) ────────── */
function initAmbientCanvas() {
  const spec = SYSTEM.ambientCanvas;
  if (!spec?.render) return;
  const splash = document.getElementById("ds-hero"); if (!splash) return; // [fix 25 — targets combined hero zone]
  if (!splash) return;

  let renderFn = spec.render;
  if (typeof renderFn === 'string') renderFn = resolveRenderFn(renderFn);
  if (typeof renderFn !== 'function') return;

  const canvas  = document.createElement('canvas');
  const zIdx    = spec.zIndex ?? 0;
  canvas.style.cssText = `position:absolute;inset:0;width:100%;height:100%;` +
    `pointer-events:none;z-index:${zIdx};`;
  splash.style.position = splash.style.position || 'relative';
  splash.appendChild(canvas);

  const fps      = GUX.isMobile ? (GUX.isLowEnd ? 8 : 14) : (spec.fps || 24);
  const interval = 1000 / fps;
  const tokens   = SYSTEM.tokens || {};
  let raf, last = 0, tick = 0, running = false;

  function resize() {
    const dpr = Math.min(GUX.dpr, GUX.isMobile ? 1.5 : 2);
    canvas.width  = Math.floor(splash.offsetWidth  * dpr);
    canvas.height = Math.floor(splash.offsetHeight * dpr);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
  }
  function frame(ts) {
    if (!running) return;
    raf = requestAnimationFrame(frame);
    if (ts - last < interval) return;
    last = ts;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.offsetWidth || splash.offsetWidth, canvas.offsetHeight || splash.offsetHeight);
    try { renderFn(canvas, ctx, tokens, tick++, GUX.isMobile); } catch(e) {}
  }
  function start() { if (running) return; running = true; raf = requestAnimationFrame(frame); }
  function stop()  { running = false; cancelAnimationFrame(raf); }

  resize();
  try { new ResizeObserver(resize).observe(splash); } catch(e) {}
  // Stop loop when section scrolls out of view
  if ('IntersectionObserver' in window) {
    new IntersectionObserver(es => es[0].isIntersecting ? start() : stop(), {threshold:.05}).observe(canvas);
  }
  document.addEventListener('visibilitychange', () => document.hidden ? stop() : start());
  if (!GUX.reducedMotion) start();
}

/* ── Feature: typography kinetics (SYSTEM.typographyKinetics field) */
function applyTypographyKinetics() {
  const tk = SYSTEM.typographyKinetics;
  if (GUX.reducedMotion) return;
  const behavior = (tk && tk.displayBehavior) || 'static';
  // Primary target: kinetic zone title — largest, most visible text on the page
  const kzTitle = document.querySelector('.gux-kz-title');
  // Secondary target: first type scale row sample (legacy)
  const rows = document.querySelectorAll('.ds-type-row');
  const rowEl = rows.length ? rows[0].firstElementChild : null;
  // Static fallback: apply sustained breathing to the kinetic zone title
  if (behavior === 'static') {
    if (kzTitle) kzTitle.style.animation =
      'gux-kz-rise 1.2s cubic-bezier(.16,1,.3,1) both, gux-kz-breathe 5s 1.4s ease-in-out infinite';
    return;
  }
  // For configured kinetics, apply to BOTH targets
  const targets = [kzTitle, rowEl].filter(Boolean);
  if (!targets.length) return;
  const el = targets[0]; // primary for inline assignments below

  const spd = tk.speed || 1;
  function ks(id, css) {
    if (document.getElementById(id)) return;
    const s = document.createElement('style'); s.id = id; s.textContent = css;
    document.head.appendChild(s);
  }

  if (behavior === 'marquee') {
    ks('gux-kf-marquee',`@keyframes gux-marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}`);
    const t = el.textContent;
    targets.forEach(function(t2){t2.style.overflow='hidden';t2.style.whiteSpace='nowrap';});
    const sp = document.createElement('span');
    sp.textContent = t + '   ·   ' + t;
    sp.style.cssText = `display:inline-block;animation:gux-marquee ${(14/spd).toFixed(1)}s linear infinite;`;
    el.textContent = ''; el.appendChild(sp);
  } else if (behavior === 'breathing') {
    ks('gux-kf-breathe',`@keyframes gux-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}`);
    targets.forEach(function(t2){t2.style.animation=`gux-breathe ${(3.2/spd).toFixed(1)}s ease-in-out infinite`;});
  } else if (behavior === 'blur-focus') {
    ks('gux-kf-bfocus',`@keyframes gux-bfocus{0%{filter:blur(9px);opacity:.25}65%{filter:blur(0);opacity:1}100%{filter:blur(0);opacity:1}}`);
    targets.forEach(function(t2){t2.style.animation=`gux-bfocus ${(2.4/spd).toFixed(1)}s ease-out both`;});
  } else if (behavior === 'stamp') {
    ks('gux-kf-stamp',`@keyframes gux-stamp{0%{transform:scale(1.18) translateY(-4px);opacity:0}15%{opacity:.85}28%,100%{transform:scale(1);opacity:1}}`);
    targets.forEach(function(t2){t2.style.animation=`gux-stamp ${(.55/spd).toFixed(2)}s cubic-bezier(.2,1.5,.4,1) both`;});
  } else if (behavior === 'glitch') {
    const kf = tk.keyframes || `@keyframes gux-glitch{0%,88%,100%{clip-path:none;transform:none}89%{clip-path:inset(8% 0 82% 0);transform:translate(-2px,0)}92%{clip-path:inset(68% 0 14% 0);transform:translate(2px,0)}95%{clip-path:none;transform:translateX(-1px)}}`;
    ks('gux-kf-glitch', kf);
    targets.forEach(function(t2){t2.style.animation=`gux-glitch ${(4.5/spd).toFixed(1)}s steps(1) infinite`;});
  }
}

/* ── Fix 3: CSS injection safety net (belt and suspenders) ──────── */
function rebuildLiveOverrides() {
  // ── Live retokenization sweep ────────────────────────────────────────
  // tokenizeInlineStyles ran once at render time using SYSTEM.tokens.
  // When the T-panel changes a color, the CSS var changes on :root but any
  // inline styles that still have hardcoded hex (not matched initially) stay
  // stale. This sweep reads the CURRENT computed CSS values and converts any
  // remaining hex matches to var() references so they update live.
  (function _liveRetokenize() {
    const _cs = getComputedStyle(document.documentElement);
    const _main = document.getElementById('ds-main');
    if (!_main) return;
    const _safeHex = new Set(['#000000','#ffffff','#000','#fff']);
    const _cmap = new Map();
    ['--primary','--secondary-col','--bg','--surface','--on-bg','--on-bg-muted','--border','--error'].forEach(k => {
      const v = _cs.getPropertyValue(k).trim();
      if (v && v.startsWith('#') && !_safeHex.has(v.toLowerCase())) _cmap.set(v.toLowerCase(), k);
    });
    _main.querySelectorAll('[style]').forEach(el => {
      let _s = el.getAttribute('style');
      if (!_s || !_s.includes('#')) return;
      let _changed = false;
      for (const [_hex, _var] of _cmap) {
        if (_s.toLowerCase().includes(_hex)) {
          _s = _s.replace(new RegExp(_hex.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), `var(${_var})`);
          _changed = true;
        }
      }
      if (_changed) el.setAttribute('style', _s);
    });
  })();
  let s = document.getElementById('gux-live-overrides');
  if (!s) { s = document.createElement('style'); s.id = 'gux-live-overrides'; document.head.appendChild(s); }
  s.textContent = `
    .ds-btn-item > *:first-child,
    .ds-card-grid > div,
    .ds-form-stack input, .ds-form-stack select,
    .ds-form-stack textarea, .ds-form-stack button,
    .ds-elev-card, .ds-comp-cell, .ds-effect-demo-area,
    .ds-motion-cell, .ds-radius-box, .ds-ct-card,
    .db-metric, .db-panel, .db-chart-area,
    .lp-feature-card, .lp-hero-cta button {
      border-radius: var(--radius-default) !important;
      font-family: var(--font-body) !important;
    }
    /* Universal radius override — active only when --gux-global-radius is set */
    *:not(svg):not(circle):not(rect):not(path):not(line):not(polyline):not(polygon):not(ellipse) {
      border-radius: var(--gux-global-radius, revert) !important;
    }
    .ds-section { background: var(--bg) !important; color: var(--on-bg) !important; }
    .ds-layout-section { background: var(--bg) !important; color: var(--on-bg) !important; }
    .ds-card-grid > div { background: var(--surface) !important; border-color: var(--border) !important; }
    .db-sidebar, .db-topbar, .db-metric, .db-panel, .db-chart-area {
      border-color: var(--border) !important;
    }
    .db-metric-value { color: var(--primary) !important; }
    .db-sidebar-brand { color: var(--primary) !important; }
    .db-sidebar-item.active { color: var(--primary) !important; border-left-color: var(--secondary-col, var(--primary)) !important; }
    .db-status-dot { background: var(--semantic-live, var(--primary)) !important; }
    .db-signal-fill { background: var(--db-signal-fill, var(--primary)) !important; }
    .ds-spacing-bar { background: var(--primary) !important; }
  `;
}

/* ── Orchestrator: run all enhancements after DOM is ready ───────── */
function initEnhancements() {
  initProgressRibbon();
  initScrollReveal();
  initComponentFlipper();
  initInspectTooltip();
  initAmbientCanvas();
  applyTypographyKinetics();
  initTokenEditor();
}


/* ── Spacing grid [master fix] ── */
function applySpacingGrid() {
  var SNAP = {2:4,3:4,5:4,6:8,7:8,10:12,14:16,18:16,20:24,28:32,40:48};
  var PROPS = [
    'marginTop','marginRight','marginBottom','marginLeft',
    'paddingTop','paddingRight','paddingBottom','paddingLeft',
    'gap','rowGap','columnGap'
  ];
  try {
    Array.from(document.styleSheets).forEach(function(ss) {
      try {
        Array.from(ss.cssRules || []).forEach(function(rule) {
          if (!rule.style) return;
          PROPS.forEach(function(prop) {
            var val = rule.style[prop];
            if (!val || !val.endsWith('px')) return;
            var n = Math.round(parseFloat(val));
            if (SNAP[n] !== undefined) {
              rule.style[prop] = SNAP[n] + 'px';
            }
          });
        });
      } catch(e) {}
    });
  } catch(e) {}
}
applySpacingGrid();

/* ── Typescale enforcement [master fix 26] ── */
function applyTypescale() {
  var MAP = function(n) {
    if (n >= 32) return n;           // 32px+ already correct or intentional
    if (n >= 21) return 32;          // 21-31px → 32px heading tier
    if (n >= 15) return 20;          // 15-20px → 20px reading tier
    return 16;                       // ≤14px → 16px label tier
  };
  // Icon exceptions — leave these sizes alone in their specific contexts
  var ICON_SELECTORS = ['lp-feature-icon','gux-editor-fab','db-icon'];
  try {
    Array.from(document.styleSheets).forEach(function(ss) {
      try {
        Array.from(ss.cssRules || []).forEach(function(rule) {
          if (!rule.style || !rule.selectorText) return;
          // Skip type-row descendants (they display the actual type scale)
          if (rule.selectorText.indexOf('ds-type-row') >= 0) return;
          // Skip token editor panel — labels must stay legible at all scale values
          if (rule.selectorText.indexOf('gux-editor-panel') >= 0 || rule.selectorText.indexOf('gux-ed-') >= 0) return;
          // Skip icon classes
          if (ICON_SELECTORS.some(function(s){ return rule.selectorText.indexOf(s)>=0; })) return;
          var fs = rule.style.fontSize;
          if (!fs || !fs.endsWith('px')) return;
          var n = parseFloat(fs);
          if (isNaN(n) || n === MAP(n)) return;
          // Write rem so css cascade responds to html { font-size: calc(--gux-type-scale * 16px) }
          var remVal = MAP(n) / 16;
          rule.style.setProperty('font-size', remVal.toFixed(5) + 'rem', rule.style.getPropertyPriority('font-size'));
        });
      } catch(e) {}
    });
  } catch(e) {}
}
applyTypescale();

/* Initialize — single system, render immediately */
if (!SYSTEM) {
  console.warn('[GUX] No system registered. Check that registerSystem() was called.');
} else {
  render();
}
